spec_version: 1
name: incident_env
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: single_service_failure
    difficulty: easy
    description: "Diagnose a single service outage from clear error logs and metrics"
  - id: cascading_failure
    difficulty: medium
    description: "Trace a cascading failure across multiple services to find the root cause"
  - id: performance_degradation
    difficulty: hard
    description: "Identify a subtle performance issue with red herrings and no explicit errors"
